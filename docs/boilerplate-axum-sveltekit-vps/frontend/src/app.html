<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Boilerplate Axum + SvelteKit — SSR e real-time" />
		%sveltekit.head%
		<style>
			:root {
				color-scheme: light dark;
				font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				line-height: 1.5;
			}
			body {
				margin: 0;
				padding: 0;
				background: #0b1020;
				color: #e8ecf7;
			}
			a {
				color: #8ab4ff;
			}
			main {
				max-width: 720px;
				margin: 0 auto;
				padding: 2rem 1.25rem;
			}
			.card {
				background: #141b2f;
				border: 1px solid #243056;
				border-radius: 12px;
				padding: 1.25rem;
				margin: 1rem 0;
			}
			.metric {
				font-size: 2.5rem;
				font-weight: 700;
				font-variant-numeric: tabular-nums;
			}
			.muted {
				color: #9aa6c3;
				font-size: 0.9rem;
			}
			nav {
				display: flex;
				gap: 1rem;
				margin-bottom: 1.5rem;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
