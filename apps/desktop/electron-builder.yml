appId: com.rodolfochicone.rc
productName: rc
copyright: Copyright © 2026 Escale Tech

directories:
  output: dist-packaged
  buildResources: build-resources

# App icon (Escale brand mark). build-resources/icon.icns is used for macOS;
# build-resources/icon.png (1024x1024) is the source electron-builder converts
# to the Windows .ico and Linux icon set.
icon: build-resources/icon.png

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../../bin/rc
    to: bin/rc
    filter:
      - "**"

mac:
  icon: icon.icns
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  notarize: false

dmg:
  title: rc ${version}
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
