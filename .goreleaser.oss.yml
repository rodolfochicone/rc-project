# OSS GoReleaser config (no Pro license / GORELEASER_KEY required).
# Mirrors the historical release artifacts (cross-platform tarballs + checksums)
# without the Pro-only features (top-level metadata, npms, homebrew casks) or the
# steps that need extra tooling/tokens (cosign signing, SBOMs, source archive).
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: rc

env:
  - GO111MODULE=on
  - CGO_ENABLED=0

git:
  tag_sort: -version:refname

before:
  hooks:
    - make frontend-build

builds:
  - id: rc
    main: ./cmd/rc
    binary: rc
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/rodolfochicone/rc-project/internal/version.Version={{ .Version }}
      - -X github.com/rodolfochicone/rc-project/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/rodolfochicone/rc-project/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: rc-archive
    ids:
      - rc
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "0.0.0-{{ .Timestamp }}"

changelog:
  use: git
  sort: asc
  abbrev: 7
  groups:
    - title: "🎉 Features"
      regexp: "^.*feat[\\(\\w)]*:+.*$"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^.*fix[\\(\\w)]*:+.*$"
      order: 1
    - title: "⚡ Performance Improvements"
      regexp: "^.*perf[\\(\\w)]*:+.*$"
      order: 2
    - title: "🔒 Security"
      regexp: "^.*security[\\(\\w)]*:+.*$"
      order: 3
    - title: "📚 Documentation"
      regexp: "^.*docs[\\(\\w)]*:+.*$"
      order: 4
    - title: "♻️ Refactoring"
      regexp: "^.*refactor[\\(\\w)]*:+.*$"
      order: 5
    - title: "📦 Dependencies"
      regexp: "^.*deps[\\(\\w)]*:+.*$"
      order: 6
    - title: "🧪 Testing"
      regexp: "^.*test[\\(\\w)]*:+.*$"
      order: 7
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^(build|ci): "
      - "^ci\\(release\\): "
      - "^release: "
      - "^chore\\(release\\): "
      - "^chore: auto-update generated files$"
      - "^chore: docs$"
      - "^chore: schema update$"
      - "^chore: typo$"
      - "^chore\\(legal\\): "
      - "^chore\\(deps\\): "
      - "^docs: update$"
      - "^test:"
      - "^test\\("
      - "merge conflict"
      - Merge branch
      - Merge pull request
      - Merge remote-tracking branch
      - go mod tidy
      - "^wip "
      - "^wip:"

release:
  github:
    owner: rodolfochicone
    name: rc-project
  name_template: "Release {{ .Version }}"
  mode: replace
  draft: false
  prerelease: auto
