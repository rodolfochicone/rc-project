name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify plugin
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      # RC ships plain markdown and dependency-free Node scripts — no build, no binary,
      # no package manager install. The gate runs in seconds, so every push runs it whole.
      - name: Plugin smoke (frontmatter, hooks, orphan skills, CLI residue, dangling assets)
        run: node scripts/plugin-smoke.mjs

      - name: Lessons machine self-test
        run: node scripts/lessons.mjs --selftest
