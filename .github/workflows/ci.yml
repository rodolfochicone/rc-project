name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: 0
  GO_VERSION: "1.26.1"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      verify: ${{ steps.filter.outputs.verify }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            verify:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.bun-version'
              - 'bun.lock'
              - 'package.json'
              - 'packages/ui/**'
              - 'web/**'
              - 'openapi/**'
              - 'scripts/**'
              - 'tsconfig.json'
              - 'tsconfig.base.json'
              - 'turbo.json'
              - '.goreleaser.yml'
              - '.github/actions/setup-bun/**'
              - '.github/actions/setup-go/**'
              - '.github/workflows/ci.yml'
              - 'cmd/**'
              - 'command/**'
              - 'internal/**'
              - 'skills/**'

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    if: needs.changes.outputs.verify == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go with caching
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ env.GO_VERSION }}
          install-tools: "true"

      - name: Set up Bun with caching
        uses: ./.github/actions/setup-bun

      - name: Install Playwright browser
        working-directory: web
        run: bunx playwright install --with-deps chromium

      - name: Run verification pipeline
        run: make verify
        continue-on-error: false
        env:
          CGO_ENABLED: 1

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: verify-results-go-${{ env.GO_VERSION }}
          path: |
            coverage.out
            test-results.xml
            .tmp/playwright/**
          if-no-files-found: ignore
          retention-days: 7
