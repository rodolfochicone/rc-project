name: Release

on:
  # A `release:` / `ci(release):` commit on main cuts a release
  push:
    branches:
      - main

  # Manual trigger for emergency releases
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force a release even if no changes"
        required: false
        type: boolean
        default: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.1"
  NODE_VERSION: "22"

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  # Production release: a `release:` / `ci(release):` commit on main, or manual dispatch
  release:
    name: Production Release
    if: |
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/main' &&
       (contains(github.event.head_commit.message, 'ci(release):') ||
        startsWith(github.event.head_commit.message, 'release:'))) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Prepare Go temporary directory
        env:
          GOTMPDIR: ${{ runner.temp }}/go-tmp
        run: mkdir -p "$GOTMPDIR"

      - name: Set up Go with caching
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ env.GO_VERSION }}
          install-tools: "true"

      - uses: ./.github/actions/setup-node

      - uses: ./.github/actions/setup-bun

      - name: Setup Release Tools
        uses: ./.github/actions/setup-release
        with:
          goreleaser-distribution: goreleaser
          setup-docker: true
          setup-docker-login: true
          setup-qemu: true
          docker-registry: ghcr.io
          docker-username: ${{ github.actor }}
          docker-token: ${{ secrets.GITHUB_TOKEN }}
          cosign-version: "v2.2.4"

      - name: Create Git Tag
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          # Use git-cliff to get the bumped version
          VERSION=$(git cliff --bumped-version 2>/dev/null | sed 's/^v//')
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
            echo "Created and pushed tag v$VERSION"
          else
            echo "Could not get version from git-cliff. Got: $VERSION"
            echo "Fallback: Extract from commit message"
            VERSION=$(git log -1 --pretty=format:"%s" | sed -E 's/.*Release v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
            if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag -a "v$VERSION" -m "Release v$VERSION"
              git push origin "v$VERSION"
              echo "Created and pushed tag v$VERSION"
            else
              echo "Could not extract version from any source. Got: $VERSION"
              exit 1
            fi
          fi

      - name: Ensure release notes file exists
        run: |
          if [ ! -f RELEASE_BODY.md ]; then
            echo "No release body found, creating empty file"
            touch RELEASE_BODY.md
          fi

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: >-
            release --clean
            --release-notes=RELEASE_BODY.md
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          # Re-enable after uncommenting the AUR block in `.goreleaser.yml`.
          # AUR_KEY: ${{ secrets.AUR_KEY }}
          COSIGN_EXPERIMENTAL: 1
          GOTMPDIR: ${{ runner.temp }}/go-tmp
