name: "CodeQL config for RC"

# RC ships plain markdown plus dependency-free Node scripts, shell hooks and an OpenCode
# TS plugin. CodeQL has no shell analyzer, so the hooks are out of its reach — what it can
# see is the JS/TS (scripts/, opencode/) and the workflows themselves (`actions`), where
# untrusted PR input reaching a `run:` block is a real, checkable risk.

queries:
  - uses: security-extended

paths-ignore:
  # Example/reference code shipped inside skills — teaching material, not RC's own code.
  - "skills/**"
